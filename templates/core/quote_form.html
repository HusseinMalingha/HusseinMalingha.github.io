{% extends 'base.html' %} {% load static %} {% load crispy_forms_tags %} {% block content %}
<div class="row m-5">
    <div class="col-md-12">
        <form action="" method="post">
            {% csrf_token %}
            <fieldset>
                <legend>Get Quote</legend>
                {{ form|crispy }}
                <div class="form-group">
                    <button class="btn btn-primary" type="submit">Send</button>
                </div>
            </fieldset>
        </form>
    </div>
</div>
{% endblock content %}
